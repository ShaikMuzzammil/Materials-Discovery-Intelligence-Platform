# Docker Compose for local full-stack development
# Brings up: web (Django) + worker (Celery) + redis + db (Postgres) + neo4j (optional)

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matdiscoverai
      POSTGRES_USER: mda
      POSTGRES_PASSWORD: mda_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: neo4j/yourpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neodata:/data
    profiles: ["full"]

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --reload --workers 2 backend.wsgi:application
    environment:
      DJANGO_SECRET_KEY: dev-insecure-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8000"
      DATABASE_URL: postgres://mda:mda_dev_password@db:5432/matdiscoverai
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MATERIALS_PROJECT_API_KEY: ${MATERIALS_PROJECT_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - modeldata:/app/ml/models/saved
      - chromadata:/app/chroma_db
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A backend worker -l info --concurrency=2
    environment:
      DJANGO_SECRET_KEY: dev-insecure-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://mda:mda_dev_password@db:5432/matdiscoverai
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MATERIALS_PROJECT_API_KEY: ${MATERIALS_PROJECT_API_KEY:-}
    volumes:
      - .:/app
      - modeldata:/app/ml/models/saved
      - chromadata:/app/chroma_db
    depends_on:
      - redis
      - db

  flower:
    image: mher/flower:1.2.0
    command: celery --broker=redis://redis:6379/1 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    profiles: ["full"]

volumes:
  pgdata:
  neodata:
  modeldata:
  chromadata:
