# Render Blueprint for MatDiscoverAI
# Docs: https://render.com/docs/blueprint-spec
# How to use: connect this repo to Render → New Blueprint → select this file.

services:
  - type: web
    name: matdiscoverai-web
    runtime: python
    rootDir: .
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 4 --timeout 120 backend.wsgi:application
    healthCheckPath: /admin/login/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://matdiscoverai-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: matdiscoverai-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: matdiscoverai-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: matdiscoverai-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false  # set manually in Render dashboard
      - key: MATERIALS_PROJECT_API_KEY
        sync: false
      - key: OPENALEX_EMAIL
        value: your-email@example.com
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: model-data
      mountPath: /app/ml/models/saved
      sizeGB: 1
    plan: starter  # upgrade to standard for production

  - type: worker
    name: matdiscoverai-worker
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend worker -l info --concurrency=2
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: matdiscoverai-web
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: matdiscoverai-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: matdiscoverai-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: matdiscoverai-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: MATERIALS_PROJECT_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
    plan: starter

  - type: redis
    name: matdiscoverai-redis
    ipAllowList: []  # allow all (tighten in production)
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: matdiscoverai-db
    databaseName: matdiscoverai
    user: mda
    plan: starter
