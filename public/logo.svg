<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" opacity="0.1"/>
  <!-- Atom structure -->
  <circle cx="100" cy="100" r="25" fill="url(#grad2)"/>
  <!-- Electron orbits -->
  <ellipse cx="100" cy="100" rx="70" ry="30" stroke="url(#grad1)" stroke-width="3" fill="none" transform="rotate(0 100 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="30" stroke="url(#grad1)" stroke-width="3" fill="none" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="30" stroke="url(#grad1)" stroke-width="3" fill="none" transform="rotate(120 100 100)"/>
  <!-- Electrons -->
  <circle cx="170" cy="100" r="8" fill="#06b6d4"/>
  <circle cx="65" cy="126" r="8" fill="#8b5cf6"/>
  <circle cx="65" cy="74" r="8" fill="#a855f7"/>
  <!-- Text -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="url(#grad1)">MatDiscoverAI</text>
</svg>